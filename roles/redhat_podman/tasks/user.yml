# roles/redhat_podman/tasks/user.yml

---
- name: Determine home directory path
  ansible.builtin.set_fact:
    podman_user_home: "{{ (podman_mountpoints[0].mount_path) if podman_mountpoints is defined and podman_mountpoints else '/home/' + podman_service_account_name }}"

- name: Create a service account for Podman
  ansible.builtin.user:
    name: "{{ podman_service_account_name }}"
    state: present
    home: "{{ podman_user_home }}"
    create_home: yes
    shell: "{{ podman_service_account_shell }}"
    comment: "Podman service account"
    expires: -1
    password_lock: yes    
  register: user_creation_result

- name: Disable password expiration for service account
  ansible.builtin.command: chage -M -1 {{ podman_service_account_name }}
  changed_when: false

- name: Check if .bashrc exists
  ansible.builtin.stat:
    path: "{{ user_creation_result.home }}/.bashrc"
  register: bashrc_stat

- name: Copy skeleton files if needed
  ansible.builtin.shell: cp -rn /etc/skel/. "{{ user_creation_result.home }}/"
  when: not bashrc_stat.stat.exists

# --- CORRECTIF 1 : Correction ciblée des fichiers de config shell ---
- name: Ensure correct ownership of shell configuration files
  ansible.builtin.file:
    path: "{{ user_creation_result.home }}/{{ item }}"
    owner: "{{ user_creation_result.name }}"
    group: "{{ user_creation_result.group }}"
    mode: '0644'
  loop:
    - .bash_profile
    - .bash_logout
    - .bashrc
  ignore_errors: true
  when: user_creation_result is defined

# --- CORRECTIF 2 : Sécurisation du dossier home (SANS RECURSIVITÉ) ---
- name: Ensure home directory ownership (root only)
  ansible.builtin.file:
    path: "{{ user_creation_result.home }}"
    owner: "{{ user_creation_result.name }}"
    group: "{{ user_creation_result.group }}"
    state: directory
    recurse: no  # CRITIQUE : Doit être à 'no' pour ne pas corrompre le stockage Podman
  when: user_creation_result is defined

- name: Enable linger for the service account
  ansible.builtin.command: "loginctl enable-linger {{ podman_service_account_name }}"
  register: linger_result
  changed_when: linger_result.rc == 0
  failed_when: linger_result.rc not in [0, 1]

- name: Configure .bashrc for Podman environment
  ansible.builtin.blockinfile:
    path: "{{ user_creation_result.home }}/.bashrc"
    block: |
      # Podman and systemd user session environment
      export XDG_RUNTIME_DIR=/run/user/$(id -u)
      export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"
      export PATH="$HOME/bin:$PATH"

      # Optional: Podman aliases
      alias pd='podman'
      alias pdi='podman images'
      alias pdps='podman ps'
      alias pdpsa='podman ps -a'

      # Journal access aliases (USER SERVICES ONLY - sécurisé)
      {% if podman_configure_journal_access | default(true) %}
      alias logs-user='journalctl --user'
      alias logs-follow='journalctl --user -f'
      alias logs='~/bin/logs'
      # Note: Pas d'accès système pour sécurité        {% endif %}
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Podman environment"
    create: true
    owner: "{{ podman_service_account_name }}"
    group: "{{ user_creation_result.group }}"
    mode: '0644'

- name: Deploy bash completion script
  ansible.builtin.template:
    src: podman_completion.sh.j2
    dest: "{{ user_creation_result.home }}/.bashrc.d/podman_completion.sh"
    owner: "{{ podman_service_account_name }}"
    group: "{{ user_creation_result.group }}"
    mode: '0644'
  when: false  # Disabled unless .bashrc.d directory structure is set up

- name: Initialize Podman for service account
  ansible.builtin.command: sudo -u {{ podman_service_account_name }} -i podman info
  register: podman_init
  failed_when: false
  changed_when: false

- name: Store user information for other tasks
  ansible.builtin.set_fact:
    podman_user_info:
      name: "{{ user_creation_result.name }}"
      home: "{{ user_creation_result.home }}"
      uid: "{{ user_creation_result.uid }}"
      group: "{{ user_creation_result.group }}"
    cacheable: yes
