# roles/redhat_podman/tasks/storage.yml

---
- name: Install LVM packages if not present
  ansible.builtin.dnf:
    name: lvm2
    state: present

- name: Create volume groups
  community.general.lvg:
    vg: "{{ item.name }}"
    pvs: "{{ item.data_device }}"
    state: present
  loop: "{{ podman_volume_groups | default([]) }}"
  register: vg_creation

- name: Create logical volumes with size in GB
  community.general.lvol:
    vg: "{{ item.vg }}"
    lv: "{{ item.name }}"
    size: "{{ item.size_gb }}g"
    state: present
  loop: "{{ podman_mountpoints | default([]) }}"
  when: item.size_gb is defined and item.size_percent is not defined
  register: lv_creation_gb

- name: Create logical volumes with percentage
  community.general.lvol:
    vg: "{{ item.vg }}"
    lv: "{{ item.name }}"
    size: "{{ item.size_percent }}%VG"
    state: present
  loop: "{{ podman_mountpoints | default([]) }}"
  when: item.size_percent is defined
  register: lv_creation_percent

- name: Set combined LV creation result
  ansible.builtin.set_fact:
    lv_creation: "{{ lv_creation_gb if lv_creation_gb is not skipped else lv_creation_percent }}"

- name: Create filesystems on logical volumes
  community.general.filesystem:
    fstype: xfs
    dev: "/dev/{{ item.vg }}/{{ item.name }}"
  loop: "{{ podman_mountpoints | default([]) }}"
  when: lv_creation is changed

- name: Ensure mount paths exist
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    mode: '0755'
  loop: "{{ podman_mountpoints | default([]) }}"

- name: Mount the filesystems
  ansible.posix.mount:
    path: "{{ item.mount_path }}"
    src: "/dev/mapper/{{ item.vg|replace('-', '--') }}-{{ item.name|replace('-', '--') }}"
    fstype: xfs
    state: mounted
    opts: "{{ item.mount_opts | default('defaults,noatime') }}"
  loop: "{{ podman_mountpoints | default([]) }}"
  register: mount_result

- name: Set correct permissions on mount points
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    mode: '0755'
  loop: "{{ podman_mountpoints | default([]) }}"
  when: mount_result is changed
